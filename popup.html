<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 240px; padding: 20px; font-family: 'Segoe UI', sans-serif;
      background: rgba(15, 15, 15, 0.85); backdrop-filter: blur(10px);
      border: 1px solid rgba(0, 255, 128, 0.3); margin: 0; text-align: center; color: #fff;
    }
    h2 {
      font-style: italic; font-weight: 900; text-transform: uppercase;
      font-size: 24px; margin: 0 0 20px 0; letter-spacing: -1px;
      text-shadow: 0 0 10px rgba(0, 255, 128, 0.8);
    }
    h2 span { color: #00ff80; }
    button {
      width: 100%; cursor: pointer; padding: 12px;
      background: rgba(0, 255, 128, 0.1); color: #00ff80;
      border: 2px solid #00ff80; border-radius: 8px;
      font-weight: bold; text-transform: uppercase; transition: 0.3s;
    }
    button:hover { background: #00ff80; color: #121212; }
  </style>
</head>
<body>
  <h2>SUB<span>CRACK</span></h2>
  <button id="findVideoBtn">CARI VIDEO!</button>
  <script src="popup.js"></script>
</body>
</html>
